<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon-web-01.png" />
    
    <!-- VIEWPORT MEJORADO -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    
    <!-- PWA META TAGS MEJORADOS -->
    <meta name="theme-color" content="#667eea" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Djamel APS" />
    
    <meta name="description" content="Djamel APS - Plataforma de aplicaciones web progresivas" />
    
    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Djamel APS" />
    <meta property="og:description" content="Plataforma para descubrir y compartir aplicaciones web progresivas" />
    <meta property="og:type" content="website" />
    
    <!-- MANIFEST PWA - RUTA CORREGIDA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" crossorigin="use-credentials" />
    
    <!-- ICONOS APPLE -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- SPLASH SCREEN IOS -->
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/splash.png" />
    
    <!-- BOOTSTRAP CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    
    <!-- ICONOS Y FUENTES -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" rel="stylesheet" />
    
    <title>Djamel APS - PWA</title>
    
    <!-- SCRIPT PWA MEJORADO -->
    <script>
      // ✅ REGISTRO MEJORADO DEL SERVICE WORKER
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Intentar registrar en la raíz primero, luego en /sw.js
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('✅ ServiceWorker registrado correctamente en: ', registration.scope);
              
              // Verificar actualizaciones cada 1 hora
              setInterval(() => {
                registration.update();
              }, 60 * 60 * 1000);
              
              // Forzar actualización en desarrollo
              if (process.env.NODE_ENV === 'development') {
                registration.update();
              }
            })
            .catch(function(error) {
              console.log('❌ ServiceWorker registro falló: ', error);
              // Intentar fallback
              navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ ServiceWorker fallback exitoso'))
                .catch(err => console.log('❌ ServiceWorker fallback fallido:', err));
            });
        });
        
        // Verificar estado del service worker
        navigator.serviceWorker.ready.then(() => {
          console.log('🎯 Service Worker listo y activo!');
        });
      } else {
        console.log('❌ ServiceWorker no soportado en este navegador');
      }
      
      // ✅ DETECCIÓN MEJORADA DE PWA
      window.isPWAInstalled = function() {
        return window.matchMedia('(display-mode: standalone)').matches || 
               window.navigator.standalone ||
               document.referrer.includes('android-app://');
      };
      
      // ✅ DEBUG PWA EN CONSOLA
      window.pwaDebug = function() {
        console.log('🔧 DEBUG PWA:', {
          isInstalled: window.isPWAInstalled(),
          isHTTPS: location.protocol === 'https:',
          isLocalhost: location.hostname === 'localhost',
          serviceWorker: 'serviceWorker' in navigator,
          beforeInstallPrompt: 'beforeinstallprompt' in window
        });
      };
      
      // Ejecutar debug al cargar
      setTimeout(window.pwaDebug, 1000);
    </script>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    <div id="root"></div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
